<!DOCTYPE html>
<html lang="en" init-page-loader>

  <head>
    <style>
      /* Миттєвий фон для всього вікна */
      html {
        background-color: #fff;
      }

      /* Ховаємо контент, поки немає статусу "ready" */
      html[init-page-loader] body {
        opacity: 0 !important;
        visibility: hidden !important;
        overflow: hidden;
        /* Блокуємо скрол під час завантаження */
      }

      /* Повертаємо видимість та скрол */
      html[init-page-loader="ready"] body {
        opacity: 1 !important;
        visibility: visible !important;
        overflow: visible;
        transition: opacity 0.6s ease-in-out !important;
      }

      /* Стиль прогрес-бару (щоб не чекати завантаження файлу CSS) */
      #loader-progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        background-color: #00ADB5;
        z-index: 100000;
        width: 0%;
        transition: width 0.4s ease, opacity 0.3s ease;
        box-shadow: 0 0 10px #0C73B8;
      }

    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Template</title>
  </head>

  <body data-page="home">

    <div class="wrapper">
      <header class="header">
        <div class="header__container">
          <ul>
            <li>
              <a href="./about.html">About</a>
            </li>
            <li>
              <a href="./contacts.html">Contacts</a>
            </li>
          </ul>
        </div>
      </header>

      <main class="page">
        <div class="page__container">
          <h1>Start Template</h1>
          Lorem ipsum dolor sit amet consectetur, adipisicing elit. Soluta, sequi.
          <button class="btn">Button</button>
        </div>
      </main>

      <footer class="footer">
        <div class="footer__container">
          <p>Footer</p>
        </div>
      </footer>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
